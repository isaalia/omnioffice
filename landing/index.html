<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OmniOffice</title>
  <meta name="description" content="Something is coming. Join the list." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --ink: #0a0a0c; --red: #c0392b; --dim: rgba(255,255,255,0.18); --faint: rgba(255,255,255,0.08); }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    body { background: var(--ink); display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; cursor: none; }
    .cursor { position: fixed; width: 8px; height: 8px; background: var(--red); border-radius: 50%; pointer-events: none; z-index: 9999; transition: transform 0.15s ease; transform: translate(-50%, -50%); }
    .cursor-ring { position: fixed; width: 32px; height: 32px; border: 1px solid rgba(192,57,43,0.35); border-radius: 50%; pointer-events: none; z-index: 9998; transition: transform 0.4s ease, width 0.3s ease, height 0.3s ease; transform: translate(-50%, -50%); }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 1; opacity: 0.6; }
    body::after { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%); pointer-events: none; z-index: 1; }
    .ambient { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(192,57,43,0.07) 0%, transparent 65%); top: 50%; left: 50%; transform: translate(-50%, -55%); pointer-events: none; z-index: 0; animation: breathe 8s ease-in-out infinite; }
    @keyframes breathe { 0%, 100% { opacity: 0.6; transform: translate(-50%, -55%) scale(1); } 50% { opacity: 1; transform: translate(-50%, -52%) scale(1.08); } }
    .content { position: relative; z-index: 2; text-align: center; padding: 0 32px; display: flex; flex-direction: column; align-items: center; }
    .mark { width: 48px; height: 48px; margin-bottom: 48px; opacity: 0; animation: rise 1.2s ease 0.2s forwards; }
    .mark-inner { width: 100%; height: 100%; border: 1px solid rgba(192,57,43,0.4); border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; }
    .mark-inner::before { content: ''; position: absolute; inset: 6px; border: 1px solid rgba(192,57,43,0.2); border-radius: 6px; }
    .mark-dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; }
    .wordmark { font-family: 'Cormorant Garamond', serif; font-size: clamp(13px, 1.5vw, 15px); font-weight: 300; letter-spacing: 0.5em; text-transform: uppercase; color: var(--dim); margin-bottom: 64px; opacity: 0; animation: rise 1.2s ease 0.4s forwards; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(52px, 9vw, 110px); font-weight: 300; font-style: italic; line-height: 0.95; letter-spacing: -0.02em; color: #fff; margin-bottom: 32px; opacity: 0; animation: rise 1.4s ease 0.5s forwards; }
    h1 em { font-style: normal; font-weight: 600; color: rgba(255,255,255,0.92); }
    .sub { font-size: clamp(14px, 1.5vw, 16px); font-weight: 300; color: rgba(255,255,255,0.28); letter-spacing: 0.04em; margin-bottom: 56px; opacity: 0; animation: rise 1.2s ease 0.7s forwards; }
    .form { display: flex; gap: 0; width: 100%; max-width: 400px; opacity: 0; animation: rise 1.2s ease 0.9s forwards; }
    .form input { flex: 1; padding: 14px 20px; background: var(--faint); border: 1px solid rgba(255,255,255,0.08); border-right: none; border-radius: 6px 0 0 6px; color: rgba(255,255,255,0.7); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300; outline: none; transition: border-color 0.3s, background 0.3s; letter-spacing: 0.02em; }
    .form input::placeholder { color: rgba(255,255,255,0.18); letter-spacing: 0.04em; }
    .form input:focus { border-color: rgba(192,57,43,0.4); background: rgba(255,255,255,0.05); }
    .form button { padding: 14px 22px; background: var(--red); border: none; border-radius: 0 6px 6px 0; color: rgba(255,255,255,0.9); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; cursor: none; transition: background 0.2s; white-space: nowrap; }
    .form button:hover { background: #a93226; }
    .success { display: none; flex-direction: column; align-items: center; gap: 10px; opacity: 0; transition: opacity 0.6s ease; }
    .success.visible { display: flex; opacity: 1; }
    .success-line { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-style: italic; font-weight: 300; color: rgba(255,255,255,0.5); letter-spacing: 0.02em; }
    .success-note { font-size: 12px; color: rgba(255,255,255,0.18); letter-spacing: 0.06em; }
    .fine { margin-top: 20px; font-size: 11px; color: rgba(255,255,255,0.12); letter-spacing: 0.06em; opacity: 0; animation: rise 1.2s ease 1.1s forwards; }
    .footer { position: fixed; bottom: 32px; left: 0; right: 0; display: flex; justify-content: center; z-index: 2; opacity: 0; animation: rise 1s ease 1.4s forwards; }
    .footer span { font-size: 11px; color: rgba(255,255,255,0.1); letter-spacing: 0.08em; }
    .footer span a { color: rgba(255,255,255,0.15); text-decoration: none; transition: color 0.2s; }
    .footer span a:hover { color: rgba(255,255,255,0.35); }
    @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 500px) { .form { flex-direction: column; } .form input { border-right: 1px solid rgba(255,255,255,0.08); border-bottom: none; border-radius: 6px 6px 0 0; } .form button { border-radius: 0 0 6px 6px; padding: 14px; } body { cursor: auto; } .cursor, .cursor-ring { display: none; } }
  </style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursor-ring"></div>
<div class="ambient"></div>
<div class="content">
  <div class="mark" aria-hidden="true"><div class="mark-inner"><div class="mark-dot"></div></div></div>
  <div class="wordmark">OmniOffice</div>
  <h1>The document<br/>reimagined<em>.</em></h1>
  <p class="sub">omnioffice.co &nbsp;·&nbsp; Coming 2026</p>
  <div class="form" id="the-form">
    <input type="email" id="email-input" placeholder="your@email.com" autocomplete="email" spellcheck="false" />
    <button onclick="submit()">Notify me</button>
  </div>
  <div class="success" id="success">
    <div class="success-line">We'll be in touch.</div>
    <div class="success-note">omnioffice.co &nbsp;·&nbsp; 2026</div>
  </div>
  <p class="fine">No noise. One email when it's ready.</p>
</div>
<div class="footer"><span>&copy; 2026 &nbsp;<a href="mailto:hello@omnioffice.co">hello@omnioffice.co</a></span></div>
<script>
  const cur = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cur.style.left = mx + 'px'; cur.style.top = my + 'px'; });
  (function animateRing() { rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12; ring.style.left = rx + 'px'; ring.style.top = ry + 'px'; requestAnimationFrame(animateRing); })();
  document.querySelectorAll('input, button, a').forEach(el => {
    el.addEventListener('mouseenter', () => { ring.style.width = '52px'; ring.style.height = '52px'; ring.style.borderColor = 'rgba(192,57,43,0.6)'; });
    el.addEventListener('mouseleave', () => { ring.style.width = '32px'; ring.style.height = '32px'; ring.style.borderColor = 'rgba(192,57,43,0.35)'; });
  });
  function submit() {
    const email = document.getElementById('email-input').value.trim();
    if (!email || !email.includes('@')) { document.getElementById('email-input').focus(); shake(document.getElementById('the-form')); return; }
    const list = JSON.parse(localStorage.getItem('oo_waitlist') || '[]');
    list.push({ email, ts: new Date().toISOString() });
    localStorage.setItem('oo_waitlist', JSON.stringify(list));
    // TODO: POST to /api/waitlist
    document.getElementById('the-form').style.display = 'none';
    document.querySelector('.fine').style.display = 'none';
    const s = document.getElementById('success');
    s.style.display = 'flex';
    requestAnimationFrame(() => s.classList.add('visible'));
  }
  document.getElementById('email-input').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  function shake(el) {
    const steps = [6, -5, 4, -3, 2, 0]; let i = 0;
    const next = () => { if (i >= steps.length) { el.style.transform = ''; return; } el.style.transform = `translateX(${steps[i++]}px)`; setTimeout(next, 60); };
    next();
  }
  const ambient = document.querySelector('.ambient');
  document.addEventListener('mousemove', e => {
    const dx = (e.clientX / window.innerWidth - 0.5) * 30;
    const dy = (e.clientY / window.innerHeight - 0.5) * 20;
    ambient.style.transform = `translate(calc(-50% + ${dx}px), calc(-55% + ${dy}px))`;
  });
</script>
</body>
</html>
